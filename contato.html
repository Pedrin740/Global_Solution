    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
        <nav>
        
        <div class="logo">
            SafeRoute
        </div>

        <ul id="menu">
            <li><a href="index.html">Home</a></li>

        </ul>
        
    </nav>
</header>

<main class="contato-container">

    <div class="contato-texto">

        <h2>Entre em Contato</h2>

        <form id="form">

            <input
                type="text"
                id="nome"
                placeholder="Seu nome"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Seu e-mail"
                required
            >

            <select id="motivo" required>
                <option value="">Selecione o motivo do contato</option>
                <option value="duvida">Dúvida</option>
                <option value="suporte">Suporte</option>
                <option value="feedback">Feedback</option>
                <option value="parceria">Parceria</option>
                <option value="outro">Outro</option>
            </select>

            <textarea
                id="mensagem"
                placeholder="Digite sua mensagem"
                required
            ></textarea>

            <button type="submit">
                Enviar
            </button>

            <button type="reset" id="resetar">
                Limpar Formulário
            </button>

            <p id="feedback"></p>

        </form>

    </div>

    <div class="hero-contato-card">

        <img
            src="img/imagem-de-contato.png"
            alt="Imagem de contato"
            class="hero-contato"
        >

    </div>

</main>

<footer>
    <p>SafeRoute © 2026 - Tecnologia para cidades mais seguras.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
